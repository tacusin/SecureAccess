<!DOCTYPE html>
<html>
<head>
    <title>Google Drive API Test</title>
</head>
<body>
    <h2>Google Drive API Connection Test</h2>
    <div id="status">Loading...</div>
    <div id="details"></div>
    <button id="test-btn" onclick="testConnection()" disabled>Test Connection</button>

    <script>
        // Environment variables injected by server
        window.GOOGLE_DRIVE_API_KEY = process.env.GOOGLE_DRIVE_API_KEY;
        window.GOOGLE_DRIVE_CLIENT_ID = process.env.GOOGLE_DRIVE_CLIENT_ID;
        
        // Your API credentials
        const API_KEY = window.GOOGLE_DRIVE_API_KEY;
        const CLIENT_ID = window.GOOGLE_DRIVE_CLIENT_ID;
        
        function updateStatus(message) {
            document.getElementById('status').innerHTML = message;
        }
        
        function addDetail(detail) {
            document.getElementById('details').innerHTML += '<br>' + detail;
        }
        
        // Load Google API with new Google Identity Services
        function loadGoogleAPI() {
            updateStatus('Loading Google Identity Services...');
            
            const gisScript = document.createElement('script');
            gisScript.src = 'https://accounts.google.com/gsi/client';
            gisScript.onload = () => {
                const apiScript = document.createElement('script');
                apiScript.src = 'https://apis.google.com/js/api.js';
                apiScript.onload = initializeAPI;
                apiScript.onerror = () => updateStatus('Failed to load Google API script');
                document.head.appendChild(apiScript);
            };
            gisScript.onerror = () => updateStatus('Failed to load Google Identity Services');
            document.head.appendChild(gisScript);
        }
        
        function initializeAPI() {
            updateStatus('Google API loaded, initializing...');
            addDetail('API Key: ' + (API_KEY ? API_KEY.substring(0, 10) + '...' : 'NOT FOUND'));
            addDetail('Client ID: ' + (CLIENT_ID ? CLIENT_ID.substring(0, 20) + '...' : 'NOT FOUND'));
            
            if (!API_KEY || !CLIENT_ID) {
                updateStatus('ERROR: Missing API credentials');
                return;
            }
            
            gapi.load('client', () => {
                gapi.client.init({
                    apiKey: API_KEY,
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
                }).then(() => {
                    updateStatus('SUCCESS: Google Drive API initialized');
                    document.getElementById('test-btn').disabled = false;
                }).catch((error) => {
                    updateStatus('ERROR: Failed to initialize Google Drive API');
                    addDetail('Error details: ' + JSON.stringify(error));
                });
            });
        }
        
        function testConnection() {
            const authInstance = gapi.auth2.getAuthInstance();
            authInstance.signIn().then(() => {
                updateStatus('SUCCESS: Signed in to Google Drive');
                addDetail('User: ' + authInstance.currentUser.get().getBasicProfile().getEmail());
            }).catch((error) => {
                updateStatus('ERROR: Sign-in failed');
                addDetail('Sign-in error: ' + JSON.stringify(error));
            });
        }
        
        // Start the test
        loadGoogleAPI();
    </script>
</body>
</html>

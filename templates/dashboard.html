<!-- Dashboard Page Template -->
<div class="page-header">
    <h2>Dashboard</h2>
    <div class="header-actions">
        <button class="btn btn-secondary" data-action="refresh-dashboard">
            <span class="material-icons">refresh</span>
            Refresh
        </button>
    </div>
</div>

<!-- Dashboard Cards -->
<div class="dashboard-grid">
    <!-- Current Occupancy Card -->
    <div class="dashboard-card occupancy-card">
        <div class="card-header">
            <h3>Current Occupancy</h3>
            <span class="material-icons card-icon">people</span>
        </div>
        <div class="card-content">
            <div class="occupancy-number" id="current-occupancy">0</div>
            <div class="occupancy-label">People in building</div>
            <div class="occupancy-capacity">
                Capacity: <span id="building-capacity">100</span>
            </div>
        </div>
    </div>

    <!-- Today's Stats Card -->
    <div class="dashboard-card stats-card">
        <div class="card-header">
            <h3>Today's Stats</h3>
            <span class="material-icons card-icon">today</span>
        </div>
        <div class="card-content">
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="todays-checkins">0</div>
                    <div class="stat-label">Check-ins</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="todays-checkouts">0</div>
                    <div class="stat-label">Check-outs</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="todays-visitors">0</div>
                    <div class="stat-label">Visitors</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="avg-duration">0m</div>
                    <div class="stat-label">Avg Duration</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Occupancy Trend Chart -->
    <div class="dashboard-card chart-card">
        <div class="card-header">
            <h3>Occupancy Trend</h3>
            <span class="material-icons card-icon">trending_up</span>
        </div>
        <div class="card-content">
            <canvas id="occupancy-chart" width="400" height="200"></canvas>
        </div>
    </div>

    <!-- Visit Duration Chart -->
    <div class="dashboard-card chart-card">
        <div class="card-header">
            <h3>Visit Duration Distribution</h3>
            <span class="material-icons card-icon">schedule</span>
        </div>
        <div class="card-content">
            <canvas id="duration-chart" width="400" height="200"></canvas>
        </div>
    </div>
</div>

<!-- Quick Actions Section -->
<div class="quick-actions-section">
    <h3>Quick Actions</h3>
    <div class="quick-actions-grid">
        <button class="quick-action-btn" data-action="quick-checkin">
            <span class="material-icons">login</span>
            Quick Check-In
        </button>
        <button class="quick-action-btn" data-action="bulk-checkout">
            <span class="material-icons">logout</span>
            Bulk Check-Out
        </button>
        <button class="quick-action-btn" data-action="add-visitor">
            <span class="material-icons">person_add</span>
            Add Visitor
        </button>
        <button class="quick-action-btn" data-action="emergency-mode">
            <span class="material-icons">warning</span>
            Emergency Mode
        </button>
    </div>
</div>

<!-- Current Occupants List -->
<div class="current-occupants-section">
    <div class="section-header">
        <h3>Current Occupants</h3>
        <div class="occupant-count">
            <span id="occupant-count">0</span> people
        </div>
    </div>
    <div id="current-occupants-list" class="occupants-list">
        <!-- Dynamically populated -->
    </div>
</div>
